<!DOCTYPE html>
<html>
<head>
    <style>
        @keyframes rotateSquare{
          0%{transform: translateY(-50%) rotate(0deg);}
          25%{transform: translateY(-60%) rotate(90deg);}
          50%{transform: translateY(-70%) rotate(180deg);}
          75%{transform: translateY(-60%) rotate(270deg);}
          100%{transform: translateY(-50%) rotate(360deg);}
        }
        .square {
          position: absolute;
          top: 240%;
          width: 50px;
          height: 50px;
          background: green;
          animation: rotateSquare 5s linear infinite;
        }
      </style>
    </head>
    <body>
      <div class="square"></div>
    </body>
