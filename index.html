<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style type="text/css">
        body{
            background-image: url(img/bigsur.png);
/*background-repeat属性定义了图像的平铺模式*/

/* background-repeat: repeat; */
/*默认值，背景图像将在垂直方向和水平方向重复,即全屏平铺*/

            background-repeat: no-repeat;
/*这个时候就会不重复平铺*/

            background-repeat: repeat-y;
/*背景图像将在垂直方向重复。*/

            background-repeat: repeat-x;
/*背景图像将在水平方向重复。*/

            /* background-size:100%; */
/* 指定背景图片大小 */

background-attachment: fixed;
/* 设置背景图像是否固定或者随着页面的其余部分滚动。 */
        }
    </style>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    .window {
      width: 500px; /*高度*/
      height: 600px; /*宽度*/
      margin: 0 auto;
      margin-top: 12px;
      }

    .header {
      background-color: #1A1818;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      padding: 10px;
      
    }

    .header::before {
      content: ' ';
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #fd6458;
      box-shadow: 20px 0 0 #ffbf2b, 40px 0 0 #24cc3d;
    }

    .window .content {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color:#242323; 
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
    }
  </style>
  <title>Document</title>
</head>
<body>
  <div
  class="window"
  >

  <div class="header">
  </div>
  <div class="content">
  <h1 align="center"><font color="white" face="黑体">hello world!</font></h1>
  <p style="text-align: center;">

   <h2 align="center"><font color="white" face="黑体">kun的游戏</font></h2>
  </div>
</div>
</body>
</html>
